services:
  mirofish:
    # 从本仓库的 Dockerfile 构建（包含 LLM provider 切换 + LightRAG + FalkorDB 记忆）
    build:
      context: .
      dockerfile: Dockerfile
    image: mirofish-local:dev
    container_name: mirofish-app                # 唯一名称，避免与其它项目冲突
    env_file:
      - .env
    # 容器内必须通过 compose service name 连接 FalkorDB，而非 .env 中的 localhost
    environment:
      MEMORY_BACKEND: "lightrag"
      FALKORDB_HOST: "falkordb"
      FALKORDB_PORT: "6379"
    ports:
      # 主机 3010 → 容器内 Vite dev server (3000)。避开 SEO/MiroFish-Offline 占用的 3000
      # 后端 5001 不再暴露到主机 —— Vite dev server 内部已将 /api 反向代理到 localhost:5001
      - "3010:3000"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
      # 持久化 HuggingFace 缓存，避免每次重启重新下载 BGE 模型 (~400MB)
      - hf_cache:/root/.cache/huggingface
      # === 开发态热重载：在容器内直接看到主机端源代码改动 ===
      # 改 .py: Flask 的 debug reloader 自动重启
      # 改 .vue/.js/.json: Vite HMR 立即生效
      # 部署生产时建议删掉下面四行，让代码以镜像内拷贝为准。
      - ./backend/app:/app/backend/app
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
      - ./locales:/app/locales
    depends_on:
      falkordb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8g

  # LightRAG 图存储（替代 Neo4j）
  # FalkorDB: MIT 许可，Rust 实现，Redis 协议，内存约 Neo4j 的 1/10
  # 仅在 MEMORY_BACKEND=lightrag 时需要
  falkordb:
    image: falkordb/falkordb:latest
    container_name: mirofish-falkordb           # 唯一名称
    ports:
      # 主机 6380 → 容器内 Redis/FalkorDB 端口 6379
      # 避开本机可能运行的 Redis（6379）
      - "6380:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1g

volumes:
  falkordb_data:
  hf_cache:
